name: Python Coverage
on:
  pull_request:
    branches:
      - main
    
permissions:
  pull-requests: write

jobs:
  python-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code                             # gets the repository content.
        uses: actions/checkout@v4
    
      - name: Set up Python                             # install Python 
        uses: actions/setup-python@v4
        with:
            python-version: 3.13

      - name: Install dependencies                      # install required packages
        run: |
            pip install -r requirements.txt
            pip install pytest==8.4.1
            pip install coverage==7.9
            pip install pytest-cov==6.2.1

      - name: Run tests and generate coverage details   # run the coverage report on the src folder
        run: pytest --cov=src

      - name: Coverage comment                          # uses a pre-made GitHub Action to share the coverage report as a comment on the pull request
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
            GITHUB_TOKEN: ${{ github.token }}
            MINIMUM_GREEN: 90
            MINIMUM_ORANGE: 70

      - name: Fail if below threshold
        run: coverage report --fail-under=90
